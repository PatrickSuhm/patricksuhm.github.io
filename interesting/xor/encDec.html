<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encrypt/Decrypt</title>
    <script>
        function xorEncryptDecrypt(message, key) {
            let result = '';
            for (let i = 0; i < message.length; i++) {
                result += String.fromCharCode(message.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return result;
        }

        function encryptMessage() {
            const message = document.getElementById('message').value;
            const key = document.getElementById('key').value;
            const encryptedMessage = xorEncryptDecrypt(message, key);
            document.getElementById('result').textContent = `Encrypted message: ${btoa(encryptedMessage)}`;
        }

        function decryptMessage() {
            const message = atob(document.getElementById('message').value);
            const key = document.getElementById('key').value;
            const decryptedMessage = xorEncryptDecrypt(message, key);
            document.getElementById('result').textContent = `Decrypted message: ${decryptedMessage}`;
        }
    </script>
</head>
<body>
    <br>
    <label for="message">Message:</label>
    <input type="text" id="message" placeholder="Enter message">
    <br>
    <label for="key">Key:</label>
    <input type="text" id="key" placeholder="Enter key">
    <br>
    <br>
    <button onclick="encryptMessage()">Encrypt</button>
    <button onclick="decryptMessage()">Decrypt</button>
    <pre id="result"></pre>
</body>
</html>
